name: Publish Alpha to NPM

on:
  push:
    branches:
      - alpha

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: npm-release-alpha
  cancel-in-progress: false

jobs:
  publish-alpha:
    if: "!startsWith(github.event.head_commit.message, 'chore: release ')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_PAT || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Generate alpha version
        id: alpha-version
        run: |
          # Read current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          # Strip any existing prerelease suffix to get the base
          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed 's/-.*//')
          # Use short SHA + timestamp for unique alpha version
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          ALPHA_VERSION="${BASE_VERSION}-alpha.${TIMESTAMP}.${SHORT_SHA}"
          echo "version=$ALPHA_VERSION" >> $GITHUB_OUTPUT
          echo "Alpha version: $ALPHA_VERSION"

          # Update package.json with alpha version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${ALPHA_VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Verify npm authentication
        run: npm whoami --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM (alpha tag)
        run: npm publish --access public --tag alpha --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## Published Alpha Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Package**: @ar.io/deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.alpha-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: alpha" >> $GITHUB_STEP_SUMMARY
          echo "- **Install**: \`npm install @ar.io/deploy@alpha\`" >> $GITHUB_STEP_SUMMARY
