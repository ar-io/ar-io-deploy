name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

jobs:
  validate-version-selection:
    name: Validate version selection
    runs-on: ubuntu-latest

    steps:
      - name: Validate release checkbox
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request?.body ?? '';
            const updateTypes = ['major', 'minor', 'patch'];
            const selected = updateTypes.filter((type) => {
              const pattern = new RegExp(`^- \\[[xX]\\]\\s*${type}\\s*$`, 'im');
              return pattern.test(body);
            });

            if (selected.length !== 1) {
              core.setFailed(
                `Select exactly one version update checkbox in the PR body. Found ${selected.length}.`,
              );
              return;
            }

            core.info(`Selected version update: ${selected[0]}`);

  ci:
    name: ${{ matrix.task }}
    needs: validate-version-selection
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        task: [lint, format, build, test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.task }}
        run: |
          case "${{ matrix.task }}" in
            lint)
              pnpm lint
              ;;
            format)
              pnpm format:check
              ;;
            build)
              pnpm build
              ;;
            test)
              pnpm build
              pnpm test:run
              ;;
          esac
